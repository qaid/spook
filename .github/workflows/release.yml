name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: Spook
  BUNDLE_ID: com.spook.app

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_PATH="${{ runner.temp }}/${{ env.APP_NAME }}.app"
          mkdir -p "$APP_PATH/Contents/MacOS"
          mkdir -p "$APP_PATH/Contents/Resources"

          cp .build/release/${{ env.APP_NAME }} "$APP_PATH/Contents/MacOS/"
          cp Resources/Info.plist "$APP_PATH/Contents/"

          if [ -f Resources/AppIcon.icns ]; then
            cp Resources/AppIcon.icns "$APP_PATH/Contents/Resources/"
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Code sign with Hardened Runtime
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements Resources/Spook.entitlements \
            --timestamp \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create DMG
        run: |
          DMG_PATH="${{ runner.temp }}/${{ env.APP_NAME }}.dmg"

          STAGING_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "$STAGING_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

          rm -rf "$STAGING_DIR"

          codesign --force --sign "${{ secrets.SIGNING_IDENTITY }}" \
            --timestamp "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -e
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" "$DMG_PATH" \
            --title "${{ env.APP_NAME }} $TAG" \
            --generate-notes
